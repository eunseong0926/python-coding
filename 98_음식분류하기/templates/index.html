<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 음식 분류기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🍕 AI 음식 분류기</h1>
        <p>음식 사진을 올리면 AI가 무슨 음식인지 맞춰줍니다.</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <button type="submit">분류하기</button>
        </form>

        {% if image_path %}
        <div class="result-box">
            <img src="{{ url_for('static', filename=image_path) }}" alt="업로드한 사진">

            {% if results %}
            <h3>분석 결과</h3>
            <ul class="result-list">
                {% for r in results %}
                <li>
                    <span class="label">{{ r.label }}</span>
                    <span class="score">{{ r.score }}%</span>
                </li>
                {% endfor %}
            </ul>
            {% endif %}
        </div>
        {% endif %}
    </div>
</body>
</html>
