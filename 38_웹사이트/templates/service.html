<!DOCTYPE html>
<html lang="ko">


<head>


<meta charset="UTF-8">

<title>Service</title>



<style>



*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Noto Sans KR",sans-serif;

}




body{

background:#f4f6f9;

}




nav{


background:#222;

padding:20px;


}



nav ul{


display:flex;

justify-content:center;

gap:40px;

list-style:none;


}




nav a{


color:white;

text-decoration:none;

font-size:18px;


}



nav a:hover{

color:#00aaff;

}





.container{


width:85%;

margin:50px auto;


}



.header{


text-align:center;

margin-bottom:40px;


}




.header h1{


font-size:42px;

margin-bottom:15px;


}



.header p{


color:#666;


}





.service-list{


display:flex;

gap:25px;

justify-content:center;


}





.service-card{


background:white;

width:300px;

padding:30px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

text-align:center;

transition:.3s;


}





.service-card:hover{


transform:translateY(-10px);


}





.icon{


font-size:50px;

margin-bottom:20px;


}





.service-card h2{


margin-bottom:15px;


}





.service-card p{


line-height:1.7;

color:#555;


}




footer{


margin-top:50px;

text-align:center;

color:#888;


}




</style>



</head>




<body>



<nav>


<ul>


<li>

<a href="/">

Home

</a>

</li>



<li>

<a href="/about">

About

</a>

</li>



<li>

<a href="/service">

Service

</a>

</li>


</ul>



</nav>





<div class="container">



<div class="header">


<h1>

Our Service

</h1>


<p>

사용자를 위한 다양한 서비스를 제공합니다.

</p>


</div>






<div class="service-list">



<div class="service-card">


<div class="icon">

💻

</div>


<h2>

웹 서비스

</h2>


<p>

편리하고 빠른 웹 환경을 제공합니다.

</p>


</div>





<div class="service-card">


<div class="icon">

⚡

</div>


<h2>

빠른 처리

</h2>


<p>

빠른 응답 속도를 제공합니다.

</p>


</div>






<div class="service-card">


<div class="icon">

🔒

</div>


<h2>

안전한 서비스

</h2>


<p>

안정적인 서비스를 제공합니다.

</p>


</div>



</div>




</div>



<footer>

© 2026 My Service

</footer>



</body>


</html>
