<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>붓꽃 품종 예측</title>

<style>
body{
    font-family: sans-serif;
    max-width: 480px;
    margin: 40px auto;
}

h2{
    text-align:center;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid gray;
    padding:8px;
    text-align:center;
}

th{
    background:#4CAF50;
    color:white;
}

input[type="number"]{
    width:100px;
}

.btn{
    margin-top:16px;
    padding:10px 20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
    width:100%;
}

.result{
    margin-top:20px;
    padding:16px;
    background:#eef7ee;
    border:1px solid #4CAF50;
    border-radius:4px;
    text-align:center;
    font-size:1.2em;
}
</style>

</head>
<body>

<h2>붓꽃(Iris) 품종 예측</h2>

<form method="post">
<table>
<tr>
    <th>측정값</th>
    <th>입력 (cm)</th>
</tr>
<tr>
    <td>{{ feature_names[0] }}</td>
    <td><input type="number" step="0.1" name="sepal_length" required></td>
</tr>
<tr>
    <td>{{ feature_names[1] }}</td>
    <td><input type="number" step="0.1" name="sepal_width" required></td>
</tr>
<tr>
    <td>{{ feature_names[2] }}</td>
    <td><input type="number" step="0.1" name="petal_length" required></td>
</tr>
<tr>
    <td>{{ feature_names[3] }}</td>
    <td><input type="number" step="0.1" name="petal_width" required></td>
</tr>
</table>

<button class="btn" type="submit">예측하기</button>
</form>

{% if result %}
<div class="result">
    예측 품종: <strong>{{ result }}</strong>
</div>
{% endif %}

</body>
</html>
